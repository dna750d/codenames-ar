<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>كود نيمز - Codenames</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <section id="lobby" class="screen">
      <h1 class="title">كود نيمز</h1>
      <p class="subtitle">لعبة محلية — نفس الجهاز</p>
      <button id="startLocalBtn" class="btn primary">ابدأ اللعبة</button>
      <p class="hint">جميع الأدوار على نفس الشاشة — مناسب للعب محلي</p>
    </section>

    <section id="game" class="screen hidden">
      <div class="game-header">
        <div class="title-sm">لوحة اللعبة</div>
        <button id="restartBtn" class="btn small">لعبة جديدة</button>
      </div>

      <div class="teams">
        <div class="team-box red">
          <h3>الفريق الأحمر</h3>
          <div id="redSpy" class="spy-word"></div>
          <div id="redOps" class="ops"></div>
        </div>
        <div class="team-box blue">
          <h3>الفريق الأزرق</h3>
          <div id="blueSpy" class="spy-word"></div>
          <div id="blueOps" class="ops"></div>
        </div>
      </div>

      <div class="turn-indicator" id="turnIndicator"></div>

      <div id="board" class="board"></div>

      <div class="controls">
        <button id="toggleViewBtn" class="btn">تبديل العرض</button>
      </div>

      <div id="status" class="status"></div>
    </section>
  </div>

  <script src="game.js"></script>
  <script src="local-client.js"></script>
</body>
</html>
